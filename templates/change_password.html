{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}

<style>
body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
.wrapper {
    max-width: 420px;
    margin: 60px auto;
    background: white;
    border-radius: 14px;
    padding: 35px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.wrapper h3 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
.wrapper p { font-size: 13px; color: #888; margin-bottom: 25px; }
.field-group { margin-bottom: 16px; }
.field-group label { font-size: 13px; font-weight: 600; color: #444; display: block; margin-bottom: 5px; }
.field-group input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 14px;
    transition: border-color 0.2s;
    box-sizing: border-box;
}
.field-group input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
.btn-submit {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white; border: none;
    border-radius: 8px; font-size: 15px;
    font-weight: 600; cursor: pointer;
    margin-top: 5px; transition: opacity 0.2s;
}
.btn-submit:hover { opacity: 0.9; }
.alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; }
.alert-error { background: #ffebee; color: #c62828; border-left: 4px solid #ef5350; }
.alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #66bb6a; }
.back-link { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #888; text-decoration: none; }
.back-link:hover { color: #1a73e8; }
</style>

<div class="wrapper">
    <h3>🔐 Change Password</h3>
    <p>Enter your current password to set a new one.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="field-group">
            <label>Current Password</label>
            <input type="password" name="old_password" placeholder="Enter current password" required>
        </div>

        <div class="field-group">
            <label>New Password</label>
            <input type="password" name="new_password" placeholder="Enter new password" required>
        </div>

        <div class="field-group">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>
        </div>

        <button type="submit" class="btn-submit">Update Password</button>
    </form>

    <a href="{% url 'dashboard' %}" class="back-link">← Back to Dashboard</a>
</div>

{% endblock %}
