{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Exam Duty System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: white; border-radius: 16px;
            padding: 40px; width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .card h3 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
        .card p { font-size: 13px; color: #888; margin-bottom: 25px; }
        .field-group { margin-bottom: 16px; }
        .field-group label { font-size: 13px; font-weight: 600; color: #444; display: block; margin-bottom: 5px; }
        .field-group input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px; font-size: 14px;
            transition: border-color 0.2s;
        }
        .field-group input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
        .btn-submit {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            margin-top: 5px; transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; }
        .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; }
        .alert-error { background: #ffebee; color: #c62828; border-left: 4px solid #ef5350; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #66bb6a; }
        .back-link { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #888; text-decoration: none; }
        .back-link:hover { color: #1a73e8; }
    </style>
</head>
<body>
<div class="card">
    <h3>🔑 Forgot Password</h3>
    <p>Enter your username and we'll send an OTP to your registered email.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="field-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required autofocus>
        </div>
        <button type="submit" class="btn-submit">📧 Send OTP</button>
    </form>

    <a href="{% url 'login' %}" class="back-link">← Back to Login</a>
</div>
</body>
</html>
