{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Exam Duty System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: white; border-radius: 16px;
            padding: 40px; width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .card h3 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
        .card p { font-size: 13px; color: #888; margin-bottom: 25px; }
        .field-group { margin-bottom: 16px; }
        .field-group label { font-size: 13px; font-weight: 600; color: #444; display: block; margin-bottom: 5px; }
        .field-group input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px; font-size: 14px;
            transition: border-color 0.2s;
        }
        .otp-input {
            letter-spacing: 8px; text-align: center;
            font-size: 20px !important; font-weight: 700;
        }
        .field-group input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
        .btn-submit {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            margin-top: 5px; transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; }
        .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; }
        .alert-error { background: #ffebee; color: #c62828; border-left: 4px solid #ef5350; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #66bb6a; }
        .back-link { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #888; text-decoration: none; }
        .back-link:hover { color: #1a73e8; }
        .otp-timer { text-align: center; font-size: 12px; color: #888; margin-bottom: 15px; }
        .otp-timer span { color: #1a73e8; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <h3>✅ Enter OTP</h3>
    <p>Enter the 6-digit OTP sent to your registered email and set your new password.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="otp-timer">OTP expires in: <span id="timer">05:00</span></div>

    <form method="POST">
        {% csrf_token %}

        <div class="field-group">
            <label>OTP</label>
            <input type="text" name="otp" class="otp-input"
                   maxlength="6" placeholder="000000" required autofocus>
        </div>

        <div class="field-group">
            <label>New Password</label>
            <input type="password" name="new_password" placeholder="Enter new password" required>
        </div>

        <div class="field-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>
        </div>

        <button type="submit" class="btn-submit">🔐 Reset Password</button>
    </form>

    <a href="{% url 'forgot_password' %}" class="back-link">← Resend OTP</a>
</div>

<script>
// 5 minute countdown timer
let seconds = 300;
const timerEl = document.getElementById('timer');
const interval = setInterval(() => {
    seconds--;
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    timerEl.textContent = `${m}:${s}`;
    if (seconds <= 0) {
        clearInterval(interval);
        timerEl.textContent = 'Expired';
        timerEl.style.color = '#c62828';
    }
}, 1000);
</script>

</body>
</html>
